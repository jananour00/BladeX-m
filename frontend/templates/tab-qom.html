<section id="tab-qom" class="tab-panel" style="display:none;">
    <div class="panel-grid">
      <div class="card input-card">
        <div class="card-header">
          <h2 class="card-title">Quality of Movement — Transformer Analysis</h2>
          <div class="mode-toggle">
            <button class="mode-btn active" id="qomUploadBtn" onclick="setQomMode('upload')">Upload</button>
            <button class="mode-btn" id="qomManualBtn" onclick="setQomMode('manual')">Manual</button>
          </div>
        </div>

        <!-- Upload Mode -->
        <div id="qomUploadMode">
          <div class="upload-zone" id="qomDropzone"
               ondragover="handleDragOver(event, 'qomDropzone')"
               ondragleave="handleDragLeave(event, 'qomDropzone')"
               ondrop="handleQomDrop(event)">
            <div class="upload-visual">
              <p class="upload-title">Drop time-series CSV</p>
              <p class="upload-hint">speed_kmh, cadence, stride_length, knee_left/right, hip_left/right, asymmetry, variability, fatigue</p>
            </div>
            <label class="upload-btn">
              Browse File
              <input type="file" id="qomFileInput" accept=".csv" onchange="handleQomFileSelect(event)" hidden />
            </label>
          </div>
        </div>

        <!-- Manual Mode -->
        <div id="qomManualMode" style="display:none;">
          <p>Enter sequence data (10 features x 30 timesteps)</p>
          <div class="field-wrap">
            <label>JSON sequence data</label>
            <textarea id="qomManualData" rows="6" placeholder='[{"speed_kmh":20.5,...}, ...]'></textarea>
          </div>
        </div>

        <button class="predict-btn" id="qomPredictBtn" onclick="runQomPrediction()">
          Analyze QoM
        </button>
      </div>

      <div class="card results-card">
        <div id="qomEmptyState" class="empty-state">
          <p>Upload CSV or enter sequence data to analyze QoM</p>
        </div>
        <div id="qomResultPanel" style="display:none;">
          <div class="result-hero">
            <div class="result-badge qom-badge">
              <span id="qomLevel" class="badge-label"></span>
            </div>
            <div class="confidence-block">
              <span id="qomScore" class="confidence-value"></span>
            </div>
          </div>
          <canvas id="qomChart" width="400" height="200"></canvas>
        </div>
      </div>
    </div>
  </section>
